    <title>TWELVE</title>

    <style>
    /* ================================================================
           RESET & BASE – Premium Cyber Theme (Purple + Orange as separate accents)
           ================================================================ */

    *,
    *::before,
    *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* ----- DEFAULT: Premium Cyber Theme (Purple & Orange separate) ----- */
    :root {
        /* Core colors */
        --bg-primary: #0b0719;
        --bg-secondary: #120c24;
        --bg-card: rgba(30, 18, 60, 0.55);
        --bg-card-hover: rgba(45, 28, 80, 0.65);

        /* Purple palette (primary) */
        --purple-deep: #4a1a8a;
        --purple-mid: #7c3aed;
        --purple-light: #a78bfa;
        --purple-glow: rgba(124, 58, 237, 0.4);

        /* Orange palette (secondary) */
        --orange-bright: #f97316;
        --orange-mid: #fb923c;
        --orange-light: #fdba74;
        --orange-glow: rgba(249, 115, 22, 0.4);

        /* No gradient blending purple & orange; each has own role */
        --gradient-main: linear-gradient(135deg, var(--purple-deep), var(--purple-mid));
        --gradient-btn-primary: linear-gradient(135deg, var(--orange-bright), var(--orange-mid));
        --gradient-btn-secondary: linear-gradient(135deg, var(--purple-deep), var(--purple-mid));
        --gradient-btn-hover-primary: linear-gradient(135deg, #ea580c, #f97316);
        --gradient-btn-hover-secondary: linear-gradient(135deg, #6d28d9, #7c3aed);

        /* Text */
        --text-primary: #f0eaff;
        --text-secondary: #c4b5e3;
        --text-muted: #8b7aaa;

        /* Borders & glow */
        --border-color: var(--purple-mid);
        --border-glow: 0 0 20px rgba(124, 58, 237, 0.15);
        --glow-purple: 0 0 30px rgba(124, 58, 237, 0.25);
        --glow-orange: 0 0 30px rgba(249, 115, 22, 0.2);

        /* Glassmorphism */
        --glass-bg: rgba(20, 12, 40, 0.6);
        --glass-border: rgba(124, 58, 237, 0.25);
        --glass-blur: 12px;
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);

        /* Buttons */
        --btn-radius: 12px;
        --btn-shadow: 0 4px 20px rgba(249, 115, 22, 0.3);

        /* Inputs */
        --input-radius: 10px;
        --input-border: rgba(124, 58, 237, 0.4);
        --input-focus-glow: 0 0 25px rgba(249, 115, 22, 0.2);

        /* Font & sizing – will be overridden by body classes */
        --font: 'Courier New', Courier, 'Lucida Sans Typewriter', monospace;
        --font-size-base: 15px;
        --font-size-sm: 0.75rem;
        --font-size-md: 0.9rem;
        --font-size-lg: 1.05rem;
        --font-size-xl: 1.2rem;
        --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);

        /* Settings */
        --settings-bg: rgba(20, 12, 40, 0.85);
        --settings-border: rgba(124, 58, 237, 0.3);
        --settings-text: #f0eaff;

        /* Hyperlinks */
        --link-color: var(--purple-light);
    }

    /* ----- Text Size classes – FIXED! ----- */
    body.text-small {
        --font-size-base: 12px;
        --font-size-sm: 0.65rem;
        --font-size-md: 0.75rem;
        --font-size-lg: 0.9rem;
        --font-size-xl: 1.0rem;
    }

    body.text-medium {
        --font-size-base: 15px;
        --font-size-sm: 0.75rem;
        --font-size-md: 0.9rem;
        --font-size-lg: 1.05rem;
        --font-size-xl: 1.2rem;

    body.text-large {

        --font-size-md: 1.05rem;
        --font-size-lg: 1.25rem;
        --font-size-xl: 1.5rem;

    body.text-xlarge {

        --font-size-md: 1.25rem;
        --font-size-lg: 1.5rem;

    }

    /* ===== BASE STYLES ===== */
    html,
    body {
        width: 100%;
        min-height: 100vh;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: var(--font);
        font-size: var(--font-size-base);
        line-height: 1.5;
        transition: background var(--transition), color var(--transition), font-size 0.2s ease;
        overflow-x: hidden;
    }

    /* Premium background with gradients and subtle patterns */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        pointer-events: none;
        background:
            radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, 0.15) 0%, transparent 60%),
            radial-gradient(ellipse at 80% 50%, rgba(249, 115, 22, 0.10) 0%, transparent 50%),
            radial-gradient(ellipse at 50% 100%, rgba(74, 26, 138, 0.20) 0%, transparent 40%),
            radial-gradient(ellipse at 50% 0%, rgba(124, 58, 237, 0.08) 0%, transparent 30%);
        animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
        0% {
            opacity: 0.6;
        }

        100% {
            opacity: 1;
        }
    }

    /* Subtle geometric overlay */
    body::after {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        pointer-events: none;
        background-image:
            linear-gradient(rgba(124, 58, 237, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(249, 115, 22, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.5;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
    }

    ::-webkit-scrollbar-track {
        background: var(--bg-secondary);
        border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
        background: var(--gradient-main);
        border-radius: 4px;
        box-shadow: var(--glow-purple);
    }

    ::-webkit-scrollbar-thumb:hover {
        background: var(--gradient-btn-secondary);
    }

    /* ===== MATRIX RAIN CANVAS ===== */
    #matrix-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        pointer-events: none;
        opacity: 0.08;
        transition: opacity 0.6s;
    }

    body.theme-light #matrix-canvas {
        opacity: 0.03;
    }

    /* ===== MAIN WRAPPER ===== */
    .app-wrapper {
        position: relative;
        z-index: 1;
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px 24px 40px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* ===== HEADER – Premium Redesign ===== */
    .header {
        text-align: center;
        padding: 18px 0 10px;
        border-bottom: 2px solid var(--purple-mid);
        margin-bottom: 28px;
        box-shadow: var(--border-glow);
        position: relative;
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border-radius: var(--btn-radius);
        border: 1px solid var(--glass-border);
        padding: 24px 24px 18px;
        overflow: hidden;
    }

    /* Loading animation overlay */
    .header::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 300%;
        height: 100%;
        background: linear-gradient(90deg,
                transparent 0%,
                rgba(124, 58, 237, 0.03) 30%,
                rgba(249, 115, 22, 0.03) 60%,
                transparent 100%);
        animation: titleSweep 2.5s ease-in-out 0.2s forwards;
        pointer-events: none;
        z-index: 0;
    }

    @keyframes titleSweep {
        0% {
            transform: translateX(0);
            opacity: 0;
        }
        30% {
            opacity: 1;
        }
        100% {
            transform: translateX(66%);
            opacity: 0;
        }
    }

    .header-title-wrapper {
        position: relative;
        z-index: 1;
        opacity: 0;
        animation: titleReveal 1.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    }

    @keyframes titleReveal {
        0% {
            opacity: 0;
            transform: scale(0.92) translateY(12px);
            filter: blur(4px);
        }
        60% {
            opacity: 1;
            transform: scale(1.02) translateY(0);
            filter: blur(0);
        }
        100% {
            opacity: 1;
            transform: scale(1) translateY(0);
            filter: blur(0);
        }
    }

    .title-row {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        gap: 28px;
        flex-wrap: wrap;
    }

    .title-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
    }

    .title-number {
        font-family: 'Dancing Script', 'Pacifico', cursive;
        font-size: clamp(1.6rem, 3.5vw, 2.8rem);
        font-weight: 700;
        color: var(--orange-bright);
        text-shadow: 0 0 30px rgba(249, 115, 22, 0.3), 0 0 60px rgba(249, 115, 22, 0.1);
        opacity: 0.85;
        line-height: 1;
        margin-bottom: -4px;
        animation: numberGlow 3s ease-in-out infinite alternate;
        letter-spacing: 1px;
        transform: rotate(-2deg);
    }

    .title-number:last-of-type {
        transform: rotate(2deg);
    }

    @keyframes numberGlow {
        0% {
            text-shadow: 0 0 20px rgba(249, 115, 22, 0.2), 0 0 40px rgba(249, 115, 22, 0.05);
            opacity: 0.7;
        }
        100% {
            text-shadow: 0 0 40px rgba(249, 115, 22, 0.5), 0 0 80px rgba(249, 115, 22, 0.15);
            opacity: 1;
        }
    }

    .title-word {
        font-family: 'Orbitron', 'Audiowide', 'Rajdhani', sans-serif;
        font-size: clamp(2.4rem, 6vw, 4.2rem);
        font-weight: 900;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--purple-light);
        text-shadow: 0 0 30px rgba(124, 58, 237, 0.3), 0 0 60px rgba(124, 58, 237, 0.1);
        transition: all var(--transition);
        line-height: 1.1;
        position: relative;
    }

    .title-word::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 10%;
        width: 80%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--orange-bright), transparent);
        opacity: 0.3;
        animation: titleUnderline 4s ease-in-out infinite alternate;
    }

    @keyframes titleUnderline {
        0% {
            opacity: 0.1;
            transform: scaleX(0.6);
        }
        100% {
            opacity: 0.5;
            transform: scaleX(1);
        }
    }

    .title-word:hover {
        text-shadow: 0 0 50px rgba(124, 58, 237, 0.5), 0 0 100px rgba(249, 115, 22, 0.15);
        transform: scale(1.02);
    }

    .title-separator {
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(1.8rem, 4vw, 3.2rem);
        color: var(--orange-bright);
        opacity: 0.4;
        padding: 0 4px;
        align-self: center;
        margin-bottom: 6px;
        animation: sepPulse 3s ease-in-out infinite alternate;
        text-shadow: 0 0 30px rgba(249, 115, 22, 0.15);
    }

    @keyframes sepPulse {
        0% {
            opacity: 0.3;
            transform: scale(0.95);
        }
        100% {
            opacity: 0.6;
            transform: scale(1.05);
        }
    }

    .header .sub {
        font-size: clamp(0.7rem, 1.2vw, 1.0rem);
        color: var(--orange-bright);
        letter-spacing: 4px;
        margin-top: 10px;
        transition: color var(--transition);
        opacity: 0.7;
        font-family: 'Rajdhani', 'Courier New', monospace;
        font-weight: 300;
    }

    .header .badge-row {
        display: flex;
        justify-content: center;
        gap: 18px;
        flex-wrap: wrap;
        margin-top: 10px;
        font-size: 0.7rem;
        color: var(--text-muted);
        letter-spacing: 1px;
        transition: color var(--transition);
    }

    .header .badge-row span {
        border: 1px solid var(--border-color);
        padding: 2px 14px;
        border-radius: 20px;
        opacity: 0.7;
        transition: all var(--transition);
        background: rgba(124, 58, 237, 0.05);
    }

    .header .badge-row span:hover {
        opacity: 1;
        border-color: var(--orange-bright);
        box-shadow: var(--glow-orange);
    }

    /* Settings gear – orange icon */
    .settings-gear {
        position: absolute;
        top: 18px;
        right: 20px;
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border: 1px solid var(--glass-border);
        color: var(--orange-bright);
        font-size: 1.4rem;
        cursor: pointer;
        transition: all var(--transition);
        padding: 6px 12px;
        border-radius: 50%;
        line-height: 1;
        opacity: 0.7;
        width: 42px;
        height: 42px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 5;
    }

    .settings-gear:hover {
        opacity: 1;
        transform: rotate(60deg) scale(1.08);
        border-color: var(--orange-bright);
        box-shadow: var(--glow-orange);
        background: rgba(249, 115, 22, 0.1);
    }

    html.lang-fa .settings-gear {
        right: auto;
        left: 20px;
    }

    /* ===== TWO-COLUMN LAYOUT ===== */
    .sections-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        flex: 1;
    }

    @media (max-width: 820px) {
        .sections-grid {
            grid-template-columns: 1fr;
            gap: 32px;
        }
        .title-row {
            gap: 16px;
        }
    }

    @media (max-width: 480px) {
        .title-row {
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .title-separator {
            transform: rotate(90deg);
            padding: 4px 0;
            margin: 0;
        }
        .title-group {
            flex-direction: column;
            align-items: center;
        }
        .title-number {
            font-size: clamp(1.4rem, 5vw, 2rem);
        }
        .title-word {
            font-size: clamp(1.8rem, 8vw, 2.6rem);
            letter-spacing: 3px;
        }
        .header {
            padding: 16px 12px 14px;
        }
        .settings-gear {
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            font-size: 1.2rem;
        }
        html.lang-fa .settings-gear {
            right: auto;
            left: 12px;
        }
    }

    /* ===== SECTION CARD – Glassmorphism, border purple ===== */
    .section-card {
        border: 1px solid var(--purple-mid);
        border-radius: var(--btn-radius);
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        padding: 18px 20px 20px;
        box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        transition: all var(--transition);
        display: flex;
        flex-direction: column;
    }

    .section-card:hover {
        border-color: var(--purple-light);
        box-shadow: var(--glass-shadow), var(--glow-purple);
    }

    .section-card .section-title {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: var(--purple-light);
        border-bottom: 1px solid var(--glass-border);
        padding-bottom: 6px;
        margin-bottom: 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all var(--transition);
    }

    .section-card .section-title .badge {
        font-size: 0.6rem;
        border: 1px solid var(--border-color);
        padding: 1px 12px;
        border-radius: 12px;
        opacity: 0.6;
        transition: all var(--transition);
        background: rgba(124, 58, 237, 0.08);
    }

    .section-card .section-title .badge:hover {
        opacity: 1;
        border-color: var(--orange-bright);
        box-shadow: var(--glow-orange);
    }

    /* ===== TEXT AREA GROUP ===== */
    .text-area-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 10px;
        position: relative;
    }

    .text-area-group .label-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .text-area-group .label-row label {
        font-size: var(--font-size-sm);
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--text-secondary);
        transition: color var(--transition);
        flex: 1;
        min-width: 120px;
    }

    .text-area-group .label-row label .input-stats {
        font-size: 0.6rem;
        opacity: 0.5;
        margin-left: 12px;
        font-weight: 400;
        letter-spacing: 0.5px;
        color: var(--text-muted);
    }

    html.lang-fa .text-area-group .label-row label .input-stats {
        margin-left: 0;
        margin-right: 12px;
    }

    /* Copy button – purple border, orange icon */
    .btn-copy-label {
        background: rgba(124, 58, 237, 0.1);
        border: 1px solid var(--purple-mid);
        color: var(--text-secondary);
        font-family: var(--font);
        font-size: var(--font-size-sm);
        padding: 2px 12px;
        border-radius: 20px;
        cursor: pointer;
        transition: all var(--transition);
        display: inline-flex;
        align-items: center;
        gap: 4px;
        white-space: nowrap;
        opacity: 0.7;
        line-height: 1.6;
        flex-shrink: 0;
    }

    .btn-copy-label:hover {
        opacity: 1;
        background: var(--gradient-btn-secondary);
        color: #fff;
        box-shadow: var(--glow-purple);
        transform: scale(1.04);
        border-color: transparent;
    }

    .btn-copy-label:active {
        transform: scale(0.94);
    }

    .btn-copy-label .icon {
        font-size: 0.9rem;
        line-height: 1;
        color: var(--orange-bright);
    }

    /* ===== TEXTAREAS – focus orange ===== */
    .cipher-textarea {
        width: 100%;
        min-height: 100px;
        max-height: 260px;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid var(--input-border);
        border-radius: var(--input-radius);
        color: var(--text-primary);
        font-family: var(--font);
        font-size: var(--font-size-md);
        padding: 12px 14px;
        resize: vertical;
        outline: none;
        transition: all var(--transition);
        line-height: 1.6;
        tab-size: 4;
    }

    .cipher-textarea:focus {
        border-color: var(--orange-bright);
        box-shadow: var(--input-focus-glow), 0 0 0 3px rgba(249, 115, 22, 0.08);
    }

    .cipher-textarea::placeholder {
        color: var(--text-muted);
        opacity: 0.4;
        font-size: var(--font-size-sm);
    }

    .cipher-textarea.output-area {
        background: rgba(0, 0, 0, 0.2);
        cursor: default;
        border-color: rgba(124, 58, 237, 0.15);
    }

    .cipher-textarea.output-area:focus {
        border-color: rgba(124, 58, 237, 0.2);
        box-shadow: none;
    }

    /* ===== BUTTONS – primary orange, secondary purple ===== */
    .btn-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 6px 0 10px;
        align-items: center;
    }

    .btn {
        background: rgba(124, 58, 237, 0.08);
        border: 1px solid var(--glass-border);
        color: var(--text-primary);
        font-family: var(--font);
        font-size: var(--font-size-sm);
        padding: 8px 20px;
        border-radius: var(--btn-radius);
        cursor: pointer;
        transition: all var(--transition);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        line-height: 1.4;
        position: relative;
        overflow: hidden;
    }

    .btn::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: var(--btn-radius);
        background: var(--gradient-btn-secondary);
        opacity: 0;
        transition: opacity var(--transition);
        z-index: -1;
    }

    .btn:hover::after {
        opacity: 1;
    }

    .btn:hover {
        color: #fff;
        border-color: transparent;
        box-shadow: var(--glow-purple);
        transform: translateY(-2px) scale(1.02);
    }

    .btn:active {
        transform: scale(0.95) translateY(0);
    }

    /* Primary button – orange */
    .btn.primary {
        background: var(--gradient-btn-primary);
        color: #fff;
        border-color: transparent;
        box-shadow: var(--btn-shadow);
        font-weight: 700;
    }

    .btn.primary::after {
        background: var(--gradient-btn-hover-primary);
    }

    .btn.primary:hover {
        box-shadow: var(--btn-shadow), var(--glow-orange);
        transform: translateY(-2px) scale(1.03);
    }

    /* Secondary button (non-primary) – purple */
    .btn:not(.primary) {
        border-color: var(--purple-mid);
    }

    .btn:not(.primary):hover {
        border-color: transparent;
        box-shadow: var(--glow-purple);
    }

    .btn:disabled {
        opacity: 0.3;
        pointer-events: none;
        transform: none;
    }

    .btn .icon {
        font-size: 1.1rem;
        line-height: 1;
        color: var(--orange-bright);
    }

    /* FOR YOU button – romantic style */
    .btn.for-you-btn {
        border-color: #ec4899;
        color: #ec4899;
        background: rgba(236, 72, 153, 0.08);
        font-weight: 700;
        letter-spacing: 2px;
    }

    .btn.for-you-btn::after {
        background: linear-gradient(135deg, #ec4899, #f472b6);
    }

    .btn.for-you-btn:hover {
        color: #fff;
        border-color: transparent;
        box-shadow: 0 0 30px rgba(236, 72, 153, 0.3);
    }

    .btn.for-you-btn .icon {
        color: #ec4899;
    }

    .btn.for-you-btn:hover .icon {
        color: #fff;
    }

    /* ===== STATS ROW ===== */
    .stats-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px 24px;
        padding: 10px 0 4px;
        border-top: 1px solid var(--glass-border);
        margin-top: 6px;
        font-size: var(--font-size-sm);
        color: var(--text-muted);
        letter-spacing: 0.5px;
        transition: all var(--transition);
    }

    .stats-row .stat-item {
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .stats-row .stat-item .num {
        color: var(--text-primary);
        font-weight: 700;
        min-width: 28px;
        transition: color var(--transition);
    }

    .stats-row .stat-item .label {
        opacity: 0.6;
    }

    /* ===== TOOLBAR – buttons secondary (purple) ===== */
    .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 12px 0 6px;
        border-top: 1px solid var(--glass-border);
        margin-top: 16px;
        align-items: center;
        justify-content: center;
        transition: border-color var(--transition);
    }

    .toolbar .btn {
        font-size: var(--font-size-sm);
        padding: 6px 16px;
        border-color: var(--purple-mid);
    }

    /* ===== FOOTER ===== */
    .footer {
        text-align: center;
        font-size: var(--font-size-sm);
        color: var(--text-muted);
        padding-top: 28px;
        margin-top: 16px;
        border-top: 1px solid var(--glass-border);
        letter-spacing: 2px;
        transition: all var(--transition);
    }

    .footer a {
        color: var(--link-color);
        text-decoration: none;
        border-bottom: 1px dotted transparent;
        transition: border-color var(--transition);
    }

    .footer a:hover {
        border-color: var(--link-color);
    }

    /* ===== TYPEWRITER CURSOR ===== */
    .typing-cursor::after {
        content: '▌';
        animation: blink 0.9s step-end infinite;
        color: var(--purple-mid);
        margin-left: 2px;
    }

    @keyframes blink {

        0%,
        100% {
            opacity: 1;
        }

        50% {
            opacity: 0;
        }
    }

    /* ===== DRAG & DROP ===== */
    .drag-over {
        border-color: var(--orange-bright) !important;
        box-shadow: var(--glow-orange) !important;
        background: rgba(249, 115, 22, 0.05) !important;
    }

    /* ===== TOAST – orange notification ===== */
    .toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border: 1px solid var(--orange-bright);
        color: var(--text-primary);
        padding: 12px 32px;
        border-radius: var(--btn-radius);
        font-family: var(--font);
        font-size: var(--font-size-md);
        letter-spacing: 1px;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        box-shadow: var(--glass-shadow), var(--glow-orange);
        z-index: 999;
        pointer-events: none;
    }

    .toast.show {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
    }

    /* =============================================================
           FOR YOU OVERLAY – Cinematic full‑screen experience
           ============================================================= */
    .for-you-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 3000;
        background: rgba(11, 7, 25, 0.92);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        opacity: 0;
        transition: opacity 0.6s ease;
    }

    .for-you-overlay.active {
        display: flex;
        opacity: 1;
    }

    .for-you-overlay .for-you-content {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        padding: 40px;
        position: relative;
    }

    .for-you-overlay .for-you-word {
        font-size: 4rem;
        font-weight: 700;
        color: #f0eaff;
        text-align: center;
        opacity: 0;
        transform: scale(0.85);
        transition: opacity 0.5s ease, transform 0.5s ease;
        text-shadow: 0 0 60px rgba(124, 58, 237, 0.3), 0 0 120px rgba(249, 115, 22, 0.1);
        max-width: 90vw;
        line-height: 1.4;
        font-family: 'Vazirmatn', 'Courier New', monospace;
    }

    .for-you-overlay .for-you-word.show {
        opacity: 1;
        transform: scale(1);
    }

    .for-you-overlay .for-you-word.hide {
        opacity: 0;
        transform: scale(1.08);
    }

    .for-you-overlay .for-you-word.is-too {
        font-family: 'Lalezar', 'Vazirmatn', 'Courier New', monospace;
        font-size: 7rem;
        font-weight: 900;
        color: #f472b6;
        text-shadow: 0 0 80px rgba(236, 72, 153, 0.4), 0 0 160px rgba(236, 72, 153, 0.15);
        letter-spacing: 2px;
    }

    .for-you-overlay .for-you-close {
        position: fixed;
        top: 24px;
        right: 28px;
        background: rgba(124, 58, 237, 0.12);
        border: 1px solid var(--purple-mid);
        color: var(--text-secondary);
        font-size: 1.6rem;
        cursor: pointer;
        transition: all var(--transition);
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        opacity: 0.5;
    }

    .for-you-overlay .for-you-close:hover {
        opacity: 1;
        background: var(--gradient-btn-secondary);
        color: #fff;
        border-color: transparent;
        transform: rotate(90deg) scale(1.08);
        box-shadow: var(--glow-purple);
    }

    .for-you-overlay .for-you-aura {
        position: absolute;
        width: 70vmin;
        height: 70vmin;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(124, 58, 237, 0.08) 0%, transparent 70%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        animation: auraPulse 4s ease-in-out infinite alternate;
    }

    @keyframes auraPulse {
        0% {
            transform: translate(-50%, -50%) scale(1);
            opacity: 0.6;
        }
        100% {
            transform: translate(-50%, -50%) scale(1.2);
            opacity: 1;
        }
    }

    @media (max-width: 768px) {
        .for-you-overlay .for-you-word {
            font-size: 2.8rem;
        }
        .for-you-overlay .for-you-word.is-too {
            font-size: 4.8rem;
        }
        .for-you-overlay .for-you-close {
            top: 16px;
            right: 16px;
            width: 44px;
            height: 44px;
            font-size: 1.3rem;
        }
    }

    @media (max-width: 480px) {
        .for-you-overlay .for-you-word {
            font-size: 2.2rem;
        }
        .for-you-overlay .for-you-word.is-too {
            font-size: 3.8rem;
        }
        .for-you-overlay .for-you-content {
            padding: 20px;
        }
    }

    /* ===== Persian language overrides ===== */
    html.lang-fa {
        direction: rtl;
        font-family: 'Vazirmatn', 'Courier New', monospace;
    }

    html.lang-fa body {
        font-family: 'Vazirmatn', 'Courier New', monospace;
    }

    html.lang-fa .header h1 {
        font-family: 'Vazirmatn', 'Courier New', monospace;
    }

    html.lang-fa .cipher-textarea,
    html.lang-fa .btn,
    html.lang-fa .stats-row,
    html.lang-fa .footer,
    html.lang-fa .settings-panel {
        font-family: 'Vazirmatn', 'Courier New', monospace;
    }

    html.lang-fa .badge-row span,
    html.lang-fa .section-title,
    html.lang-fa .text-area-group label,
    html.lang-fa .toolbar .btn,
    html.lang-fa .btn-copy-label {
        font-family: 'Vazirmatn', 'Courier New', monospace;
    }

    html.lang-fa .for-you-overlay .for-you-word {
        font-family: 'Vazirmatn', 'Courier New', monospace;
    }

    html.lang-fa .for-you-overlay .for-you-word.is-too {
        font-family: 'Lalezar', 'Vazirmatn', 'Courier New', monospace;
    }

    /* Title fonts in Persian mode – keep Orbitron for the main words */
    html.lang-fa .title-word {
        font-family: 'Orbitron', 'Audiowide', 'Rajdhani', sans-serif;
        letter-spacing: 4px;
    }

    html.lang-fa .title-number {
        font-family: 'Dancing Script', 'Pacifico', cursive;
    }

    html.lang-fa .title-separator {
        font-family: 'Orbitron', sans-serif;
    }

    /* =============================================================
           SETTINGS PANEL – Glassmorphism, purple borders, orange accents
           ============================================================= */
    .settings-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 2000;
        background: rgba(11, 7, 25, 0.6);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        display: none;
        justify-content: flex-end;
        animation: settingsFadeIn 0.25s ease;
    }

    .settings-overlay.active {
        display: flex;
    }

    @keyframes settingsFadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }

    .settings-panel {
        width: 100%;
        max-width: 420px;
        height: 100vh;
        background: var(--settings-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-left: 1px solid var(--purple-mid);
        color: var(--settings-text);
        padding: 28px 24px 32px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 24px;
        animation: settingsSlideIn 0.3s ease;
        transition: all var(--transition);
        box-shadow: -8px 0 40px rgba(0, 0, 0, 0.4);
    }

    html.lang-fa .settings-panel {
        border-left: none;
        border-right: 1px solid var(--purple-mid);
    }

    @keyframes settingsSlideIn {
        from {
            transform: translateX(40px);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }

    html.lang-fa @keyframes settingsSlideIn {
        from {
            transform: translateX(-40px);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }

    .settings-panel .settings-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--purple-mid);
        flex-shrink: 0;
        transition: border-color var(--transition);
    }

    .settings-panel .settings-header h2 {
        font-size: 1.3rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--settings-text);
        transition: color var(--transition);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .settings-panel .settings-header h2 span:first-child {
        color: var(--orange-bright);
    }

    .settings-panel .settings-header .close-settings {
        background: rgba(124, 58, 237, 0.08);
        border: 1px solid var(--purple-mid);
        color: var(--settings-text);
        font-size: 1.4rem;

            if (!text) return '';
            const out = [];
            for (const ch of text) {

                    continue;

                const code = ENC_MAP[ch];

                    out.push('-');
                } else {

                }
            }
            let result = out.join('');
            if (result.endsWith('-')) {

            }
            return result;

        function updateStats(text, charsEl, wordsEl, linesEl) {
            const chars = text.length;
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            const lines = text ? text.split('\n').length : 0;
            charsEl.textContent = chars;
            wordsEl.textContent = words;
            linesEl.textContent = lines;
        }

        function updateAllStats() {
            updateStats(encryptOutput.value, encryptChars, encryptWords, encryptLines);
            updateStats(decryptOutput.value, decryptChars, decryptWords, decryptLines);
            const charLabel = currentLang === 'fa' ? 'کاراکتر' : 'chars';
            encryptInputStats.textContent = encryptInput.value.length + ' ' + charLabel;
            encryptOutputStats.textContent = encryptOutput.value.length + ' ' + charLabel;
            decryptInputStats.textContent = decryptInput.value.length + ' ' + charLabel;
            decryptOutputStats.textContent = decryptOutput.value.length + ' ' + charLabel;
        }

        function performEncrypt() {
            const start = performance.now();
            const plain = encryptInput.value;
            const result = encrypt(plain);
            encryptOutput.value = result;
            const elapsed = (performance.now() - start).toFixed(1);
            encryptTime.textContent = `${elapsed}ms`;
            updateStats(result, encryptChars, encryptWords, encryptLines);
            encryptOutputStats.textContent = result.length + ' ' + (currentLang === 'fa' ? 'کاراکتر' : 'chars');
            applyTypewriter(encryptOutput);
            saveState();
            showToast((currentLang === 'fa' ? '✅ رمزگذاری شد در ' : '✅ Encrypted in ') + elapsed + 'ms');
        }

        function performDecrypt() {
            const start = performance.now();
            const cipher = decryptInput.value;
            const result = decrypt(cipher);
            decryptOutput.value = result;
            const elapsed = (performance.now() - start).toFixed(1);
            decryptTime.textContent = `${elapsed}ms`;
            updateStats(result, decryptChars, decryptWords, decryptLines);
            decryptOutputStats.textContent = result.length + ' ' + (currentLang === 'fa' ? 'کاراکتر' : 'chars');
            applyTypewriter(decryptOutput);
            saveState();
            showToast((currentLang === 'fa' ? '✅ رمزگشایی شد در ' : '✅ Decrypted in ') + elapsed + 'ms');
        }

        function downloadTxt(textarea, filename) {
            if (!textarea.value) {
                showToast(currentLang === 'fa' ? '⚠️ محتوایی برای دانلود وجود ندارد' : '⚠️ No content to download');
                return;
            }
            const blob = new Blob([textarea.value], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename.endsWith('.txt') ? filename : filename + '.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(currentLang === 'fa' ? '⬇ دانلود شد' : '⬇ Downloaded');
        }

            const reader = new FileReader();

        let dragCounter = 0;

        function setupDragDrop() {
            document.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
            });
            document.addEventListener('dragenter', (e) => {
                e.preventDefault();
                dragCounter++;
                if (dragCounter === 1) {
                    document.body.classList.add('drag-over');
                }
            });
            document.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dragCounter--;
                if (dragCounter === 0) {
                    document.body.classList.remove('drag-over');
                }
            });
            document.addEventListener('drop', (e) => {
                e.preventDefault();
                dragCounter = 0;
                document.body.classList.remove('drag-over');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    const file = files[0];
                    if (file.name.toLowerCase().endsWith('.txt')) {
                        handleFileUpload(file);
                    } else {
                        showToast(currentLang === 'fa' ? '⚠️ لطفاً فایل .txt را رها کنید' :
                            '⚠️ Please drop a .txt file');
                    }
                }
            });
            [encryptInput, decryptInput].forEach(el => {
                el.addEventListener('dragover', (e) => e.preventDefault());
                el.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        const file = files[0];
                        if (file.name.toLowerCase().endsWith('.txt')) {
                            handleFileUpload(file);
                        } else {
                            showToast(currentLang === 'fa' ? '⚠️ لطفاً فایل .txt را رها کنید' :
                                '⚠️ Please drop a .txt file');
                        }
                    }
                });
            });
        }

        const STORAGE_KEY = 'arcker_cipher_state';

        function saveState() {
            try {
                const state = {
                    encryptInput: encryptInput.value,
                    encryptOutput: encryptOutput.value,
                    decryptInput: decryptInput.value,
                    decryptOutput: decryptOutput.value,
                    timestamp: Date.now()
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch (_) {}
        }

        function restoreState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                const state = JSON.parse(raw);
                if (state.encryptInput !== undefined) encryptInput.value = state.encryptInput;
                if (state.encryptOutput !== undefined) encryptOutput.value = state.encryptOutput;
                if (state.decryptInput !== undefined) decryptInput.value = state.decryptInput;
                if (state.decryptOutput !== undefined) decryptOutput.value = state.decryptOutput;
                updateAllStats();
            } catch (_) {}
        }

        function setupAutoSave() {
            [encryptInput, encryptOutput, decryptInput, decryptOutput].forEach(el => {
                el.addEventListener('input', saveState);
                el.addEventListener('change', saveState);
            });

        function setupShortcuts() {
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') {
                    const active = document.activeElement;
                    if (active === encryptInput || active === encryptOutput) {
                        e.preventDefault();
                        performEncrypt();
                    } else if (active === decryptInput || active === decryptOutput) {
                        e.preventDefault();
                        performDecrypt();
                    }
                    return;
                }
                if (e.key === 'Escape') {
                    document.activeElement?.blur();
                    if (settingsOverlay.classList.contains('active')) {
                        closeSettingsPanel();
                    }
                    if (forYouOverlay.classList.contains('active')) {
                        closeForYou();
                    }
                }
            });
        }

        function initMatrixRain() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');
            let cols, drops, charSet;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                cols = Math.floor(canvas.width / 16);
                charSet = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$%^&*()_+-=[]{}|;:,.<>?/';
                drops = [];
                for (let i = 0; i < cols; i++) {
                    drops.push(Math.floor(Math.random() * -100));
                }
            }
            resize();
            window.addEventListener('resize', resize);

            function draw() {
                ctx.fillStyle = 'rgba(0,0,0,0.04)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = '14px monospace';
                ctx.textAlign = 'center';
                const isLight = document.body.classList.contains('theme-light');
                const alpha = isLight ? 0.3 : 0.5;
                for (let i = 0; i < drops.length; i++) {
                    const ch = charSet[Math.floor(Math.random() * charSet.length)];
                    const x = i * 16 + 8;
                    const y = drops[i] * 16;
                    const brightness = Math.random() * 0.5 + 0.5;
                    ctx.fillStyle =
                        `rgba(${isLight ? '0,102,51' : '124,58,237'}, ${alpha * brightness * 0.6})`;
                    ctx.fillText(ch, x, y);
                    if (y > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
                requestAnimationFrame(draw);
            }
            draw();
        }

            forYouRunning = false;
            clearTimeout(forYouTimeout);
            forYouWord.classList.remove('show', 'hide', 'is-too');
            forYouWord.textContent = '';
        }

        function startForYouAnimation() {
            if (forYouRunning) {
                closeForYou();
                setTimeout(() => {
                    startForYouAnimation();
                }, 300);
                return;
            }

            forYouRunning = true;
            forYouIndex = 0;
            forYouWord.textContent = '';
            forYouWord.classList.remove('show', 'hide', 'is-too');

            forYouOverlay.classList.add('active');
            showNextWord();
        }

        function showNextWord() {
            if (!forYouRunning || forYouIndex >= FOR_YOU_WORDS.length) {
                clearTimeout(forYouTimeout);
                forYouTimeout = setTimeout(() => {
                    closeForYou();
                }, 2000);
                return;
            }

            const word = FOR_YOU_WORDS[forYouIndex];
            const isToo = (word === 'تو');

            forYouWord.textContent = word;

            if (isToo) {
                forYouWord.classList.add('is-too');
            } else {
                forYouWord.classList.remove('is-too');
            }

            forYouWord.classList.remove('show', 'hide');
            void forYouWord.offsetWidth;
            forYouWord.classList.add('show');

            const displayDuration = isToo ? 1200 : 900;

            clearTimeout(forYouTimeout);
            forYouTimeout = setTimeout(() => {
                forYouWord.classList.remove('show');
                forYouWord.classList.add('hide');

                setTimeout(() => {
                    forYouIndex++;
                    forYouWord.classList.remove('hide');
                    showNextWord();
                }, 450);
            }, displayDuration);
        }

        // =============================================================
        //  12.  BIND EVENTS
        // =============================================================

        function bindEvents() {
            encryptBtn.addEventListener('click', performEncrypt);
            encryptInput.addEventListener('input', () => {
                encryptInputStats.textContent = encryptInput.value.length + ' ' + (currentLang === 'fa' ?
                    'کاراکتر' : 'chars');
            });
            decryptBtn.addEventListener('click', performDecrypt);
            decryptInput.addEventListener('input', () => {
                decryptInputStats.textContent = decryptInput.value.length + ' ' + (currentLang === 'fa' ?
                    'کاراکتر' : 'chars');
            });

            copyOriginalBtn.addEventListener('click', () => {
                copyTextContent(encryptInput, currentLang === 'fa' ? '📋 متن اصلی کپی شد' : '📋 Original copied');
            });
            copyEncryptedBtn.addEventListener('click', () => {
                copyTextContent(encryptOutput, currentLang === 'fa' ? '📋 متن رمزگذاری شده کپی شد' :
                    '📋 Encrypted copied');
            });
            copyCipherInputBtn.addEventListener('click', () => {
                copyTextContent(decryptInput, currentLang === 'fa' ? '📋 متن رمز کپی شد' : '📋 Cipher copied');
            });
            copyDecryptedBtn.addEventListener('click', () => {
                copyTextContent(decryptOutput, currentLang === 'fa' ? '📋 متن رمزگشایی شده کپی شد' :
                    '📋 Decrypted copied');
            });

            document.querySelector('[data-action="pasteEncrypt"]').addEventListener('click', () => {
                pasteTo(encryptInput);
            });
            document.querySelector('[data-action="clearAll"]').addEventListener('click', clearAll);
            document.querySelector('[data-action="swap"]').addEventListener('click', swapSections);
            document.querySelector('[data-action="downloadEncrypt"]').addEventListener('click', () => {
                downloadTxt(encryptOutput, 'arcker_encrypted.txt');
            });
            document.querySelector('[data-action="downloadDecrypt"]').addEventListener('click', () => {
                downloadTxt(decryptOutput, 'arcker_decrypted.txt');
            });
            document.querySelector('[data-action="upload"]').addEventListener('click', uploadTxt);
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFileUpload(e.target.files[0]);
                }
                e.target.value = '';
            });

            settingsGear.addEventListener('click', openSettingsPanel);
            closeSettings.addEventListener('click', closeSettingsPanel);
            settingsOverlay.addEventListener('click', (e) => {
                if (e.target === settingsOverlay) {
                    closeSettingsPanel();
                }
            });

            document.querySelectorAll('#langOptions .opt-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const val = btn.dataset.value;
                    if (val && val !== settings.lang) {
                        applyLanguage(val);
                    }
                });
            });

            document.querySelectorAll('#themeOptions .opt-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const val = btn.dataset.value;
                    if (val && val !== settings.theme) {
                        applyTheme(val);
                    }
                });
            });

            document.querySelectorAll('#sizeOptions .opt-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const val = btn.dataset.value;
                    if (val && val !== settings.textSize) {
                        applyTextSize(val);
                    }
                });
            });

            forYouBtn.addEventListener('click', startForYouAnimation);
            forYouClose.addEventListener('click', closeForYou);
            forYouOverlay.addEventListener('click', (e) => {
                if (e.target === forYouOverlay) {
                    closeForYou();
                }
            });
        }

        // =============================================================
        //  13.  CLEAR ON STARTUP
        // =============================================================

        function clearOnStartup() {
            encryptInput.value = '';
            encryptOutput.value = '';
            decryptInput.value = '';
            decryptOutput.value = '';
            encryptTime.textContent = '';
            decryptTime.textContent = '';
            const charLabel = currentLang === 'fa' ? 'کاراکتر' : 'chars';
            encryptInputStats.textContent = '0 ' + charLabel;
            encryptOutputStats.textContent = '0 ' + charLabel;
            decryptInputStats.textContent = '0 ' + charLabel;
            decryptOutputStats.textContent = '0 ' + charLabel;
            updateStats('', encryptChars, encryptWords, encryptLines);
            updateStats('', decryptChars, decryptWords, decryptLines);
            try {
                localStorage.removeItem(STORAGE_KEY);
            } catch (_) {}
        }

        // =============================================================
        //  14.  INIT
        // =============================================================

        function init() {
            const saved = getSettings();
            settings = saved;

            // Apply language first so numbers get correct numerals
            applyLanguage(settings.lang || 'en');
            applyTheme(settings.theme || 'cyber');
            applyTextSize(settings.textSize || 'medium');

            clearOnStartup();

            setupAutoSave();
            setupDragDrop();
            setupShortcuts();
            bindEvents();
            initMatrixRain();
            updateAllStats();

            showToast('◈ ARCKER v1 – خوش رنگ Theme');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        window.__arcker = {
            settings: settings,
            applyLanguage: applyLanguage,
            applyTheme: applyTheme,
            applyTextSize: applyTextSize,
            startForYou: startForYouAnimation,
            closeForYou: closeForYou,
            clearOnStartup: clearOnStartup,
        };

    })();
    </script>
</body>
